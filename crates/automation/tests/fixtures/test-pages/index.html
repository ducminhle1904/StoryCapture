<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>StoryCapture automation fixture</title>
    <style>
      body { font-family: system-ui; padding: 1rem; }
      .scroll { height: 200vh; background: linear-gradient(white, lightblue); }
      button { padding: 0.5rem 1rem; }
    </style>
  </head>
  <body>
    <h1 id="title">Fixture page</h1>

    <button id="save" aria-label="Save">Save</button>
    <button id="save-2" aria-label="Save changes">Save</button>

    <label for="email">Email</label>
    <input id="email" data-testid="email" type="email" />

    <div aria-label="menu" role="menu">Menu</div>

    <select id="country" data-testid="country">
      <option value="us">United States</option>
      <option value="ca">Canada</option>
    </select>

    <p id="status">idle</p>

    <div class="scroll" id="scroll-area"></div>

    <script>
      let count = 0;
      document.getElementById('save').addEventListener('click', () => {
        count += 1;
        document.getElementById('status').textContent = 'clicks=' + count;
      });
    </script>
  </body>
</html>
