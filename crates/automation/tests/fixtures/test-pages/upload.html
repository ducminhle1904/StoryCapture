<!doctype html>
<html lang="en">
  <head><meta charset="utf-8" /><title>Upload fixture</title></head>
  <body>
    <h1>Upload</h1>
    <input id="upload" type="file" data-testid="upload" />
    <p id="status">idle</p>
    <script>
      document.getElementById('upload').addEventListener('change', (e) => {
        const f = e.target.files[0];
        document.getElementById('status').textContent = f ? 'got:' + f.name : 'empty';
      });
    </script>
  </body>
</html>
