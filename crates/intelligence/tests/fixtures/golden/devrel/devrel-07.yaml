id: devrel-07
bucket: devrel
user_prompt: "Build a simple Slack workflow using Workflow Builder. Navigate to Slack, open Workflow Builder from the Tools menu, click Create Workflow, choose 'From a link in channel' as trigger, add a step to send a message to a channel with a custom text, name the workflow 'Welcome Bot', and publish it."
expected:
  min_steps: 7
  max_steps: 14
  required_verbs: [navigate, click, type, select]
  forbidden_verbs: []
  must_parse: true
  step_mapping_rubric: |
    Must have: navigate to Slack, open workflow builder, create workflow, select trigger, add message step, name workflow, publish.
    Must not: assume bot tokens, skip trigger selection.
assert:
  schema_valid: true
  verb_whitelist_compliant: true
  first_try_parse: true
