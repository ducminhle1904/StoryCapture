id: devrel-01
bucket: devrel
user_prompt: "Create a demo showing how to create a new issue in a Linear-style project management tool. Navigate to the app, click New Issue, fill in the title 'Fix login bug', set priority to Urgent, assign to the current user, add a label 'bug', and submit. Then verify the issue appears in the backlog."
expected:
  min_steps: 6
  max_steps: 12
  required_verbs: [navigate, click, type, select, wait_for]
  forbidden_verbs: []
  must_parse: true
  step_mapping_rubric: |
    Must have: navigate to app, click new issue, type title, select priority, click assign, click submit, wait for backlog.
    Must not: assume keyboard shortcuts, skip form fields, use drag for priority.
assert:
  schema_valid: true
  verb_whitelist_compliant: true
  first_try_parse: true
