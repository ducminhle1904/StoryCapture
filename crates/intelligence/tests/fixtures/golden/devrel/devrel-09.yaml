id: devrel-09
bucket: devrel
user_prompt: "Build a simple CRUD app in Retool. Navigate to retool.com, create a new app, drag a Table component onto the canvas, connect it to a REST API resource pointing to https://api.example.com/users, add a Form component for creating new users with name and email fields, and wire the form submit to POST the data. Preview the app."
expected:
  min_steps: 8
  max_steps: 16
  required_verbs: [navigate, click, type, drag, select]
  forbidden_verbs: []
  must_parse: true
  step_mapping_rubric: |
    Must have: navigate to Retool, create app, add table component, configure data source, add form, wire submit action, preview.
    Must not: assume database connection exists, skip data source configuration.
assert:
  schema_valid: true
  verb_whitelist_compliant: true
  first_try_parse: true
