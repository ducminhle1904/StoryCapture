id: devrel-02
bucket: devrel
user_prompt: "Show a Stripe checkout flow with tax calculation. Navigate to the product page at checkout.stripe.com/demo, click Buy Now, fill in email, card number 4242424242424242, expiry 12/28, CVC 123, enter a US billing address with zip 94105 to trigger tax, and complete the purchase. Wait for the success confirmation."
expected:
  min_steps: 8
  max_steps: 15
  required_verbs: [navigate, click, type, wait_for]
  forbidden_verbs: []
  must_parse: true
  step_mapping_rubric: |
    Must have: navigate to checkout page, type email, type card details, type billing address, click pay, wait for confirmation.
    Must not: assume saved payment method, skip tax verification step.
assert:
  schema_valid: true
  verb_whitelist_compliant: true
  first_try_parse: true
