id: edge-03
bucket: edge
user_prompt: "Complete a 22-step onboarding wizard. Navigate to the app, start onboarding, fill in company name, select industry from dropdown, enter team size, upload company logo, choose color theme, set timezone, add first team member email, configure notification preferences, enable two-factor auth, set billing plan, enter payment method, review all settings, accept terms of service, click through 3 tutorial slides, dismiss the welcome modal, verify the dashboard loads, take a final screenshot."
expected:
  min_steps: 18
  max_steps: 25
  required_verbs: [navigate, click, type, select, upload, wait_for, screenshot]
  forbidden_verbs: []
  must_parse: true
  step_mapping_rubric: |
    Must have: at least 18 distinct steps covering navigation, form fills, selections, file upload, and verification.
    Must not: collapse multiple wizard pages into a single step, skip the screenshot.
assert:
  schema_valid: true
  verb_whitelist_compliant: true
  first_try_parse: true
