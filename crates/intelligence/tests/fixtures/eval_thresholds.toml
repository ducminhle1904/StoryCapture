# AI-SPEC section 5.3 evaluation thresholds.
# eval_report compares eval_result.json metrics against these values.
# Any metric below its threshold triggers a non-zero exit (regression).

[thresholds]
dsl_parse_first_try          = 0.92
verb_whitelist_compliance    = 1.00
step_mapping_fidelity        = 0.90
selector_groundedness        = 0.85
narration_faithfulness       = 0.88
prompt_cache_hit_ratio       = 0.90
cost_per_turn_p95_usd        = 0.05
first_token_ms_p50           = 800
tts_timing_drift_ms_p95      = 150
adversarial_pass_rate        = 1.00
