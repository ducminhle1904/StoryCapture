<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StoryCapture Shared Texture Probe</title>
    <style>
      html,
      body,
      canvas {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="fixture" width="1920" height="1080"></canvas>
    <script>
      const canvas = document.getElementById("fixture");
      const context = canvas.getContext("2d", { alpha: false });
      let ordinal = 0;

      function drawMarker(value) {
        for (let bit = 0; bit < 20; bit += 1) {
          context.fillStyle = value & (1 << bit) ? "#ffffff" : "#000000";
          context.fillRect(bit * 16, 0, 16, 16);
        }
      }

      function drawFrame() {
        ordinal += 1;
        const highMotion = ordinal > 300;
        context.fillStyle = highMotion ? "#101820" : "#355070";
        context.fillRect(0, 0, 1920, 1080);
        if (highMotion) {
          for (let index = 0; index < 24; index += 1) {
            const x = (index * 173 + ordinal * 29) % 1920;
            const y = (index * 97 + ordinal * 17) % 1080;
            context.fillStyle = index % 2 === 0 ? "#ffb703" : "#e63946";
            context.fillRect(x - 120, y - 60, 240, 120);
          }
        } else {
          context.fillStyle = "#f2e9e4";
          context.fillRect(320, 240, 1280, 600);
          context.fillStyle = "#22223b";
          context.font = "700 96px sans-serif";
          context.fillText("STATIC", 760, 570);
        }
        drawMarker(ordinal);
        requestAnimationFrame(drawFrame);
      }
      requestAnimationFrame(drawFrame);
    </script>
  </body>
</html>
