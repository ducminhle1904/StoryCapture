name: "Setup StoryCapture toolchain"
description: "Install pnpm and Node for the StoryCapture monorepo."

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: pnpm
