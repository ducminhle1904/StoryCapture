# DIST-01/02/03: Tagged-release pipeline.
#
# Triggers: push of a tag matching `v*` (e.g., `v0.1.0`, `v0.1.0-rc1`).
# Never runs on PRs — release is an explicit action.
#
# Pipeline per matrix cell:
#   1. Checkout + setup toolchain
#   2. Download FFmpeg + Playwright sidecar artifacts into binaries/
#   3. `pnpm install --frozen-lockfile`
#   4. Import macOS signing cert (macOS cells only)
#   5. `pnpm --filter @storycapture/desktop tauri build --target <triple>`
#      — Tauri signs the updater bundle using TAURI_SIGNING_PRIVATE_KEY.
#   6. Notarize via scripts/notarize/notarize-mac.sh (macOS) OR sign via
#      scripts/release/sign-windows.ps1 (Windows).
#   7. Strict installer-size budget check.
#   8. Upload installer + updater bundle + .sig to the draft GitHub Release.
#
# Final `publish` job runs on ubuntu, generates `latest.json` from the
# release's assets, uploads it, and flips the release from draft to
# published. Tauri clients auto-update by fetching that latest.json.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            platform: macos
          - os: macos-13
            target: x86_64-apple-darwin
            platform: macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-toolchain

      - name: Download FFmpeg artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ffmpeg-build.yml
          name: ffmpeg-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/
          if_no_artifact_found: fail

      - name: Download Playwright sidecar artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: playwright-sidecar-build.yml
          name: playwright-sidecar-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/
          if_no_artifact_found: fail

      - name: Mark sidecars executable (macOS/Linux)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          chmod +x apps/desktop/src-tauri/binaries/ffmpeg-${{ matrix.target }} || true
          chmod +x apps/desktop/src-tauri/binaries/playwright-sidecar-${{ matrix.target }} || true

      - name: Install pnpm deps
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Import macOS codesign certificate
        if: matrix.platform == 'macos'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build (with signed updater artifacts)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_UPDATER_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_UPDATER_KEY_PASSWORD }}
          # Tauri picks these up for its internal signtool invocation when
          # bundle.windows.certificateThumbprint is set; we use
          # sign-windows.ps1 instead (below), so these are inert for win.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
        shell: bash
        run: |
          pnpm --filter @storycapture/desktop tauri build --target ${{ matrix.target }}

      - name: Locate installer + updater bundle
        id: locate
        shell: bash
        run: |
          bundle_dir=apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle
          installer=$(find "$bundle_dir" -type f \( -name "*.dmg" -o -name "*-setup.exe" -o -name "*.msi" \) | head -1)
          updater=$(find "$bundle_dir" -type f \( -name "*.app.tar.gz" -o -name "*-setup.nsis.zip" -o -name "*.msi.zip" \) | head -1)
          sig=$(find "$bundle_dir" -type f -name "*.sig" | head -1)
          echo "installer=$installer" >> "$GITHUB_OUTPUT"
          echo "updater=$updater" >> "$GITHUB_OUTPUT"
          echo "sig=$sig" >> "$GITHUB_OUTPUT"
          if [ -z "$installer" ] || [ -z "$updater" ] || [ -z "$sig" ]; then
            echo "missing release artifact — installer=$installer updater=$updater sig=$sig" >&2
            find "$bundle_dir" -maxdepth 3 -type f >&2 || true
            exit 1
          fi

      - name: Notarize macOS bundle
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_DEVELOPER_IDENTITY }}
          APPLE_ENTITLEMENTS_PATH: apps/desktop/src-tauri/Entitlements.plist
        run: |
          app_path=$(find apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos -maxdepth 2 -name "*.app" -type d | head -1)
          if [ -z "$app_path" ]; then
            echo "no .app bundle produced" >&2
            exit 1
          fi
          bash scripts/notarize/notarize-mac.sh \
            --app-path "$app_path" \
            --identity "$APPLE_SIGNING_IDENTITY" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --entitlements "$APPLE_ENTITLEMENTS_PATH"

      - name: Sign Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_KEY_VAULT_URL: ${{ secrets.AZURE_KEY_VAULT_URL }}
          WINDOWS_SIGNING_CERT_NAME: ${{ secrets.WINDOWS_SIGNING_CERT_NAME }}
          EV_CERT_AZURE_KV_NAME: ${{ secrets.EV_CERT_AZURE_KV_NAME }}
        run: |
          powershell -File scripts/release/sign-windows.ps1 `
            -InstallerPath "${{ steps.locate.outputs.installer }}" `
            -Mode TrustedSigning

      - name: Verify installer size budget (strict)
        shell: bash
        run: bash scripts/release/verify-installer-size.sh "${{ steps.locate.outputs.installer }}" --strict

      - name: Upload installer + updater bundle to draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.locate.outputs.installer }}
            ${{ steps.locate.outputs.updater }}
            ${{ steps.locate.outputs.sig }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate latest.json from draft release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/release/generate-latest-json.mjs > latest.json

      - name: Inspect manifest (debug)
        run: cat latest.json

      - name: Upload latest.json and publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          tag_name: ${{ github.ref_name }}
          files: latest.json
