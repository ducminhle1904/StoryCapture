name: Playwright Sidecar (Node SEA) — per-triple build

# Builds the playwright-sidecar SEA artifact for each Tauri externalBin
# triple on every PR that touches the sidecar source. The release pipeline
# (Plan 01-10) downloads, signs, and notarizes the artifacts before
# bundling them into the StoryCapture installer (D-15, AUTO-06).

on:
  pull_request:
    paths:
      - 'scripts/playwright-sidecar/**'
      - '.github/workflows/playwright-sidecar-build.yml'
  push:
    branches: [main]
    paths:
      - 'scripts/playwright-sidecar/**'
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.triple }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            triple: aarch64-apple-darwin
          - os: macos-13
            triple: x86_64-apple-darwin
          - os: windows-latest
            triple: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: scripts/playwright-sidecar/package.json

      - name: Install sidecar deps
        working-directory: scripts/playwright-sidecar
        run: pnpm install --frozen-lockfile=false

      - name: Build SEA (${{ matrix.triple }})
        working-directory: scripts/playwright-sidecar
        run: node build-sea.mjs --target ${{ matrix.triple }}

      - name: Smoke test (capabilities call)
        if: runner.os != 'Windows'
        run: |
          BIN="apps/desktop/src-tauri/binaries/playwright-sidecar-${{ matrix.triple }}"
          if [ ! -x "$BIN" ]; then echo "binary not produced"; exit 1; fi
          echo '{"jsonrpc":"2.0","id":1,"method":"capabilities"}' | "$BIN" | head -1 | tee out.json
          grep -q '"file_upload":true' out.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-sidecar-${{ matrix.triple }}
          path: apps/desktop/src-tauri/binaries/playwright-sidecar-${{ matrix.triple }}*
          if-no-files-found: error
          retention-days: 14
