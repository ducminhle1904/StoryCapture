name: Rust check (host-only)

# Lightweight, fast feedback workflow that compiles host-native crates only
# (no cross-target). Useful for draft PRs / docs-only branches that still
# touch crates/* — the full matrix in ci.yml covers all three triples.

on:
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"

concurrency:
  group: rust-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  host-check:
    runs-on: macos-14
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-toolchain
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy (host)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo check (host)
        run: cargo check --workspace --all-targets
