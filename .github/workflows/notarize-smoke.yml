# Wave-0 release-gate smoke test: prove the macOS sign + notarize + staple
# pipeline works end-to-end on a fresh runner before any product code ships.
#
# Per Phase 1 plan 01-02 (no_credentials_mode):
#   * Apple Developer ID credentials are NOT yet provisioned.
#   * Every credential-dependent step is guarded by `if: secrets.APPLE_ID != ''`
#     so the workflow runs to completion (and stays green) without secrets.
#   * The moment the secrets are added in repo settings, the same workflow
#     starts actually signing + notarizing + stapling — no code change needed.
#
# When credentials ARE present:
#   1. Import Developer ID cert into a fresh keychain.
#   2. Pull the FFmpeg sidecar from the ffmpeg-build.yml artifact.
#   3. Build the smoke Tauri app (which bundles FFmpeg as externalBin).
#   4. Run notarize-mac.sh end-to-end.
#   5. Final assertion: spctl -a -vv reports "accepted source=Notarized".

name: notarize-smoke

on:
  pull_request:
    paths:
      - scripts/notarize/**
      - scripts/build-ffmpeg/**
      - .github/workflows/notarize-smoke.yml
  push:
    branches: [main]
    paths:
      - scripts/notarize/**
      - scripts/build-ffmpeg/**
      - .github/workflows/notarize-smoke.yml
  workflow_dispatch:

concurrency:
  group: notarize-smoke-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  notarize-smoke:
    name: macOS sign + notarize + staple
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # Credentials-pending mode: short-circuit with a clear message.
      # ----------------------------------------------------------------
      - name: Detect credential availability
        id: creds
        run: |
          if [[ -n "${{ secrets.APPLE_ID }}" \
             && -n "${{ secrets.APPLE_APP_PASSWORD }}" \
             && -n "${{ secrets.APPLE_TEAM_ID }}" \
             && -n "${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}" \
             && -n "${{ secrets.APPLE_SIGNING_IDENTITY }}" ]]; then
            echo "have_creds=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple credentials detected — running full notarization smoke test."
          else
            echo "have_creds=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Apple credentials NOT configured — running scaffold-only path. See docs/CREDENTIALS.md."
          fi

      # ----------------------------------------------------------------
      # Always-on: lint the pipeline scripts so a syntax regression in the
      # dormant scripts is caught even without credentials.
      # ----------------------------------------------------------------
      - name: Lint pipeline scripts (bash -n)
        run: |
          bash -n scripts/notarize/notarize-mac.sh
          bash -n scripts/notarize/notarize-smoke.sh
          bash -n scripts/notarize/adhoc-sign.sh

      # ----------------------------------------------------------------
      # Always-on: dry-run notarize-mac.sh with no creds — must exit 0
      # with the "skipped — credentials pending" message. Proves the
      # credential gate works before we depend on it for real releases.
      # ----------------------------------------------------------------
      - name: Verify credential-gate exits 0 when secrets absent
        run: |
          set -e
          # Build a stub bundle so the script gets past the path check.
          STUB="$(mktemp -d)/Stub.app"
          mkdir -p "$STUB/Contents/MacOS"
          touch "$STUB/Contents/MacOS/Stub"
          # Force-clear creds for this step
          env -u APPLE_ID -u APPLE_APP_PASSWORD -u APPLE_TEAM_ID -u APPLE_SIGNING_IDENTITY \
            bash scripts/notarize/notarize-mac.sh --app-path "$STUB" 2>&1 | tee out.log
          grep -q "skipped — credentials pending" out.log

      # ----------------------------------------------------------------
      # The remaining steps only run when creds are present.
      # ----------------------------------------------------------------

      - name: Download FFmpeg sidecar (aarch64-apple-darwin)
        if: steps.creds.outputs.have_creds == 'true'
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ffmpeg-build.yml
          name: ffmpeg-aarch64-apple-darwin
          path: scripts/notarize/smoke-app/src-tauri/binaries/
          if_no_artifact_found: warn

      - name: Setup Node 20 + pnpm
        if: steps.creds.outputs.have_creds == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        if: steps.creds.outputs.have_creds == 'true'
        run: npm install -g pnpm@9

      - name: Setup Rust toolchain
        if: steps.creds.outputs.have_creds == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Import Developer ID certificate
        if: steps.creds.outputs.have_creds == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build smoke Tauri app
        if: steps.creds.outputs.have_creds == 'true'
        working-directory: scripts/notarize/smoke-app
        run: |
          pnpm install
          pnpm tauri build --target aarch64-apple-darwin

      - name: Notarize smoke app
        if: steps.creds.outputs.have_creds == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="scripts/notarize/smoke-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/SmokeNotarize.app"
          bash scripts/notarize/notarize-mac.sh \
            --app-path "$APP_PATH" \
            --identity "$APPLE_SIGNING_IDENTITY" \
            --apple-id "$APPLE_ID" \
            --team-id  "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Final spctl assertion
        if: steps.creds.outputs.have_creds == 'true'
        run: |
          APP_PATH="scripts/notarize/smoke-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/SmokeNotarize.app"
          spctl -a -vv "$APP_PATH" 2>&1 | tee spctl.log
          grep -q "accepted" spctl.log
          grep -q "Notarized" spctl.log

      - name: Upload notarized .app + log
        if: steps.creds.outputs.have_creds == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: smoke-notarize-app
          path: |
            scripts/notarize/smoke-app/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/SmokeNotarize.app
            spctl.log
          if-no-files-found: warn
