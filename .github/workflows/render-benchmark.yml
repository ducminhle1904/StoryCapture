name: Render Benchmark (EXPORT-06 PR gate)

# Runs on every pull request and asserts FFmpeg's `-progress speed=N.Nx`
# stays above 2.0x on a generic GitHub-hosted runner. This is a
# hardware-independent proxy for EXPORT-06 — the canonical wall-clock gate
# lives in `release-benchmark.yml` and only runs on the self-hosted
# reference Mac mini.

on:
  pull_request:
    paths:
      - "crates/encoder/**"
      - "crates/effects/**"
      - "scripts/benchmark/**"
      - ".github/workflows/render-benchmark.yml"
  workflow_dispatch: {}

jobs:
  benchmark:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      # The FFmpeg sidecar lives in `apps/desktop/src-tauri/binaries/` at
      # bundle time. For the benchmark we rely on the system FFmpeg — the
      # render pipeline is identical; the sidecar is just a packaging
      # concern. `ffmpeg-build.yml` (Phase 1 Plan 01-02) produces the
      # bundled-binary artifact consumed by release builds.
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg jq

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ffmpeg -y
          choco install jq -y

      - name: Run 1-minute render benchmark (speed-factor gate)
        shell: bash
        env:
          STRICT_WALL_CLOCK: "0"
        run: bash scripts/benchmark/render-1min.sh

      - name: Upload FFmpeg progress log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-progress-${{ matrix.os }}
          path: /tmp/*/ffmpeg-progress.log
          if-no-files-found: ignore
