name: Encoder A/V Drift Check

# ENC-05 / D-26: produce a 10-minute synthetic recording using the Plan
# 01-02 FFmpeg sidecar artifact, then run ffprobe to assert the A/V
# streams stay aligned within 100 ms end-to-end. Fails the build if not.

on:
  pull_request:
    paths:
      - 'crates/encoder/**'
      - 'scripts/ci/check-av-drift.sh'
      - 'scripts/ci/generate-synthetic-recording.sh'
      - '.github/workflows/encoder-av-drift.yml'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'crates/encoder/**'
      - 'scripts/ci/check-av-drift.sh'
      - 'scripts/ci/generate-synthetic-recording.sh'

jobs:
  drift-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            triple: aarch64-apple-darwin
            ext: ''
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Download FFmpeg + ffprobe (ffmpeg-build.yml artifact)
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ffmpeg-build.yml
          branch: main
          name: ffmpeg-${{ matrix.triple }}
          path: .
          if_no_artifact_found: warn

      - name: Prep binaries
        shell: bash
        run: |
          set -euo pipefail
          # Artifact archives from ffmpeg-build.yml package as
          # ffmpeg-<triple>{,.exe} + ffprobe-<triple>{,.exe}. Normalize.
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv ffmpeg-${{ matrix.triple }}${{ matrix.ext }} ffmpeg.exe 2>/dev/null || true
            mv ffprobe-${{ matrix.triple }}${{ matrix.ext }} ffprobe.exe 2>/dev/null || true
          else
            mv ffmpeg-${{ matrix.triple }} ffmpeg 2>/dev/null || true
            mv ffprobe-${{ matrix.triple }} ffprobe 2>/dev/null || true
            chmod +x ffmpeg ffprobe 2>/dev/null || true
          fi
          ls -la ffmpeg* ffprobe* || true

      - name: Gate — skip if binaries missing
        id: gate
        shell: bash
        run: |
          if [[ ! -x "./ffmpeg${{ matrix.ext }}" || ! -x "./ffprobe${{ matrix.ext }}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "[gate] ffmpeg/ffprobe artifact missing — drift check skipped (expected until ffmpeg-build.yml has produced a main-branch artifact)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate synthetic recording (10 min)
        if: steps.gate.outputs.skip == 'false'
        shell: bash
        run: FFMPEG=./ffmpeg${{ matrix.ext }} bash scripts/ci/generate-synthetic-recording.sh synthetic.mp4

      - name: Check A/V drift (< 100 ms)
        if: steps.gate.outputs.skip == 'false'
        shell: bash
        run: FFPROBE=./ffprobe${{ matrix.ext }} bash scripts/ci/check-av-drift.sh synthetic.mp4

      - uses: actions/upload-artifact@v4
        if: steps.gate.outputs.skip == 'false' && always()
        with:
          name: synthetic-recording-${{ matrix.triple }}
          path: synthetic.mp4
          if-no-files-found: ignore
