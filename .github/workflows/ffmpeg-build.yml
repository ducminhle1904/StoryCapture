# Build the static FFmpeg sidecars for all three target triples. Recorder
# High/Lossless MP4 output requires GPL libx264, so `verify-static.sh`
# enforces static linking, libx264 presence, and absence of nonfree codecs.
#
# Triggers on every PR that touches the build recipe so a regression in the
# build script is caught before merge. `workflow_dispatch` lets us re-mint
# binaries without a code change (e.g., to refresh after a security advisory).

name: ffmpeg-build

on:
  pull_request:
    paths:
      - scripts/build-ffmpeg/**
      - .github/workflows/ffmpeg-build.yml
  push:
    branches: [main]
    paths:
      - scripts/build-ffmpeg/**
      - .github/workflows/ffmpeg-build.yml
  workflow_dispatch:

concurrency:
  group: ffmpeg-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-mac-arm64:
    name: ffmpeg / aarch64-apple-darwin
    runs-on: macos-14  # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          brew install nasm yasm pkg-config
          brew install x264
          brew install openh264 || echo "openh264 install failed; proceeding without LGPL software fallback"

      - name: Cache FFmpeg source tarball + build tree
        uses: actions/cache@v4
        with:
          path: |
            scripts/build-ffmpeg/cache
            scripts/build-ffmpeg/build
          key: ffmpeg-mac-arm64-${{ hashFiles('scripts/build-ffmpeg/build-macos.sh', 'scripts/build-ffmpeg/ffmpeg-7.0.2.sha256') }}

      - name: Build ffmpeg (aarch64)
        run: bash scripts/build-ffmpeg/build-macos.sh aarch64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-aarch64-apple-darwin
          path: |
            scripts/build-ffmpeg/out/ffmpeg-aarch64-apple-darwin
            scripts/build-ffmpeg/out/ffprobe-aarch64-apple-darwin
          if-no-files-found: error
          retention-days: 14

  build-mac-x64:
    name: ffmpeg / x86_64-apple-darwin
    runs-on: macos-13  # Intel runner
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          brew install nasm yasm pkg-config
          brew install x264
          brew install openh264 || echo "openh264 install failed; proceeding without LGPL software fallback"

      - name: Cache FFmpeg source tarball + build tree
        uses: actions/cache@v4
        with:
          path: |
            scripts/build-ffmpeg/cache
            scripts/build-ffmpeg/build
          key: ffmpeg-mac-x64-${{ hashFiles('scripts/build-ffmpeg/build-macos.sh', 'scripts/build-ffmpeg/ffmpeg-7.0.2.sha256') }}

      - name: Build ffmpeg (x86_64)
        run: bash scripts/build-ffmpeg/build-macos.sh x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-x86_64-apple-darwin
          path: |
            scripts/build-ffmpeg/out/ffmpeg-x86_64-apple-darwin
            scripts/build-ffmpeg/out/ffprobe-x86_64-apple-darwin
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: ffmpeg / x86_64-pc-windows-msvc
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            curl
            make
            yasm
            nasm
            pkg-config
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-x264
            mingw-w64-x86_64-zlib

      - name: Fetch nv-codec-headers (NVENC)
        run: |
          set -euo pipefail
          mkdir -p /tmp/nvc
          cd /tmp/nvc
          curl -fL https://github.com/FFmpeg/nv-codec-headers/releases/download/n12.2.72.0/nv-codec-headers-12.2.72.0.tar.gz \
            | tar -xz
          cd nv-codec-headers-*
          make install PREFIX=/mingw64

      - name: Cache FFmpeg source tarball + build tree
        uses: actions/cache@v4
        with:
          path: |
            scripts/build-ffmpeg/cache
            scripts/build-ffmpeg/build
          key: ffmpeg-win64-${{ hashFiles('scripts/build-ffmpeg/build-windows.sh', 'scripts/build-ffmpeg/ffmpeg-7.0.2.sha256') }}

      - name: Build ffmpeg (windows x86_64)
        run: bash scripts/build-ffmpeg/build-windows.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-x86_64-pc-windows-msvc
          path: |
            scripts/build-ffmpeg/out/ffmpeg-x86_64-pc-windows-msvc.exe
            scripts/build-ffmpeg/out/ffprobe-x86_64-pc-windows-msvc.exe
          if-no-files-found: error
          retention-days: 14
