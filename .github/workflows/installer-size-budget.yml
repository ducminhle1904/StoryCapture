# DIST-04: Enforce the <50 MB installer budget (excluding FFmpeg +
# Playwright sidecars) on every PR and every push to main.
#
#   - PR          → advisory mode (warn if over 50 MB; hard-fail only > 60)
#   - push main   → strict (fail on > 50 MB)
#
# FFmpeg + Playwright artifacts from the PR-fork workflows aren't trusted
# (they may execute arbitrary code), so PR builds use placeholder stubs
# dropped by `scripts/dev/install-sidecar-placeholders.sh`-style touch.
# That means the sidecar bytes are ~0 in PR mode; the "excluded from
# budget" subtraction in verify-installer-size.sh collapses to a no-op,
# and the residual we measure == total. On main, `ffmpeg-build.yml`
# produces trusted artifacts we download into binaries/.
name: Installer Size Budget

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  size-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-toolchain

      # PR fork artifacts untrusted → empty placeholder sidecars (zero bytes).
      # On main, prefer a trusted ffmpeg-build.yml artifact if one exists for
      # the matrix triple; fall back to placeholders if not (first-time main).
      - name: Install sidecar placeholders (PR / fallback)
        shell: bash
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          case "${{ matrix.target }}" in
            *windows*) ext=".exe" ;;
            *)         ext="" ;;
          esac
          for name in ffmpeg playwright-sidecar; do
            path="apps/desktop/src-tauri/binaries/${name}-${{ matrix.target }}${ext}"
            if [ ! -f "$path" ]; then
              printf '#!/bin/sh\necho "placeholder ${name} — not executable" >&2\nexit 127\n' > "$path"
              chmod +x "$path"
            fi
          done

      - name: Download FFmpeg artifact (main only, best-effort)
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ffmpeg-build.yml
          name: ffmpeg-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/
          if_no_artifact_found: warn

      - name: Install pnpm deps
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build unsigned installer
        shell: bash
        run: |
          pnpm --filter @storycapture/desktop tauri build \
            --target ${{ matrix.target }} \
            --no-bundle=false \
            --ci

      - name: Locate installer
        id: locate
        shell: bash
        run: |
          bundle_dir=apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle
          installer=$(find "$bundle_dir" -type f \( -name "*.dmg" -o -name "*-setup.exe" -o -name "*.msi" \) | head -1)
          if [ -z "$installer" ]; then
            echo "no installer produced" >&2
            find "$bundle_dir" -maxdepth 3 -type f >&2 || true
            exit 1
          fi
          echo "installer=$installer" >> "$GITHUB_OUTPUT"

      - name: Verify size (advisory on PR, strict on main)
        shell: bash
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            bash scripts/release/verify-installer-size.sh "${{ steps.locate.outputs.installer }}" --strict
          else
            bash scripts/release/verify-installer-size.sh "${{ steps.locate.outputs.installer }}"
          fi
