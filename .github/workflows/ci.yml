name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build-test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: pnpm install
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Astryx rollout guard
        shell: bash
        run: pnpm ui:legacy-check

      - name: Gothic theme generated artifacts
        shell: bash
        run: pnpm --dir packages/ui run theme:check

      - name: Lint
        shell: bash
        run: pnpm lint

      - name: Typecheck
        shell: bash
        run: pnpm typecheck

      - name: Desktop tests
        shell: bash
        run: pnpm --dir apps/desktop exec vitest run

      - name: Desktop Gothic UI E2E
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:ui

      - name: Cursor synchronization Electron smoke
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:cursor-sync

      - name: Scroll Electron smoke
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:scroll

      - name: Local media playback Electron smoke
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:media

      - name: UI tests
        shell: bash
        run: pnpm --dir packages/ui test

      - name: Web tests
        shell: bash
        run: pnpm --dir apps/web test

      - name: Install web UI E2E browsers
        shell: bash
        run: pnpm --dir apps/web exec playwright install chromium firefox webkit

      - name: Web Gothic UI E2E
        shell: bash
        run: pnpm --dir apps/web run test:e2e:ui

      - name: Desktop package and export parity smoke
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:export

      - name: Packaged native capture helper gate
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:recording-v2-helper

      - name: Web production build
        shell: bash
        run: pnpm --dir apps/web build

  windows-media-smoke:
    name: windows-media-smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: pnpm install
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Local media playback Electron smoke
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:media

      - name: Windows package and export parity smoke
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:export

  prisma-postgres-smoke:
    name: prisma-postgres-smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_USER: storycapture
          POSTGRES_PASSWORD: storycapture
          POSTGRES_DB: storycapture
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U storycapture -d storycapture"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://storycapture:storycapture@127.0.0.1:5432/storycapture
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: pnpm install
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        shell: bash
        run: pnpm --dir apps/web db:generate

      # The repository predates its checked-in migration history, so an empty
      # disposable database is bootstrapped from the current schema. Production
      # migration files are neither rewritten nor marked as applied here.
      - name: Bootstrap disposable schema
        shell: bash
        run: pnpm --dir apps/web db:push

      - name: Prisma adapter CRUD smoke
        shell: bash
        run: pnpm --dir apps/web db:smoke

      - name: Prisma seed smoke
        shell: bash
        run: pnpm --dir apps/web db:seed
