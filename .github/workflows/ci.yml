name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: build-test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: pnpm install
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        shell: bash
        run: pnpm typecheck

      - name: Desktop tests
        shell: bash
        run: pnpm --dir apps/desktop exec vitest run

      - name: Cursor synchronization Electron smoke
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:cursor-sync

      - name: Local media playback Electron smoke
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:media

      - name: UI tests
        shell: bash
        run: pnpm --dir packages/ui test

      - name: Web tests
        shell: bash
        run: pnpm --dir apps/web test

      - name: Desktop Electron build
        shell: bash
        run: pnpm --dir apps/desktop run build

  windows-media-smoke:
    name: windows-media-smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: pnpm install
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Local media playback Electron smoke
        shell: bash
        run: pnpm --dir apps/desktop run test:e2e:media
