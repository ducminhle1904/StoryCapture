packages:
  - "apps/*"
  - "packages/*"
overrides:
  '@electron/asar>glob': link:packages/glob-compat
  '@electron/get>global-agent': 4.1.3
  electron-updater>lodash.isequal: link:packages/lodash-isequal-compat
  temp>rimraf: link:packages/rimraf-compat
allowBuilds:
  '@ffprobe-installer/darwin-arm64': true
  '@ffprobe-installer/darwin-x64': true
  '@ffprobe-installer/linux-arm': true
  '@ffprobe-installer/linux-arm64': true
  '@ffprobe-installer/linux-ia32': true
  '@ffprobe-installer/linux-x64': true
  '@ffprobe-installer/win32-ia32': true
  '@ffprobe-installer/win32-x64': true
  '@prisma/client': true
  '@prisma/engines': true
  electron-winstaller: true
  esbuild: true
  ffmpeg-static: true
  prisma: true
  sharp: true
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  # Turbo 2.10.5 was already locked before this quarantine policy was enabled.
  - '@turbo/darwin-64@2.10.5'
  - '@turbo/darwin-arm64@2.10.5'
  - '@turbo/linux-64@2.10.5'
  - '@turbo/linux-arm64@2.10.5'
  - '@turbo/windows-64@2.10.5'
  - '@turbo/windows-arm64@2.10.5'
  - turbo@2.10.5
