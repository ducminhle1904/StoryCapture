packages:
  - "apps/*"
  - "packages/*"
overrides:
  '@electron/asar>glob': link:packages/glob-compat
  '@electron/get>global-agent': 4.1.3
  electron-updater>lodash.isequal: link:packages/lodash-isequal-compat
  temp>rimraf: link:packages/rimraf-compat
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  electron-winstaller: true
  esbuild: true
  ffmpeg-static: true
  prisma: true
  sharp: true
minimumReleaseAgeExclude:
  - '@turbo/darwin-64@2.10.1'
  - '@turbo/darwin-arm64@2.10.1'
  - '@turbo/linux-64@2.10.1'
  - '@turbo/linux-arm64@2.10.1'
  - '@turbo/windows-64@2.10.1'
  - '@turbo/windows-arm64@2.10.1'
  - turbo@2.10.1
