<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Picker Fixture</title>
  </head>
  <body>
    <!-- Rank 1: testid -->
    <button data-testid="save-btn">Save</button>

    <!-- Rank 2: role+name (no testid) -->
    <a href="#docs">Docs</a>

    <!-- Rank 3: field/label (form input with <label for>) -->
    <label for="email">Email</label>
    <input id="email" type="email" />

    <!-- Rank 4: exact visible text (non-interactive span) -->
    <span>Learn more about it</span>

    <!-- Rank 5: CSS fallback (generic div, no useful a11y signals) -->
    <div
      class="mystery-widget"
      style="width:60px;height:20px;background:#eee"
    ></div>

    <!-- Decoys: substring near-miss for exact-text rank (must NOT match
         "Learn more about it" exactly) -->
    <p>Learn more</p>
    <p>Learn more stuff</p>
  </body>
</html>
